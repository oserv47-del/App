<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Monitor CCTV</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h2 { margin-bottom: 10px; }
        #status {
            background: #333;
            padding: 10px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #00ffcc;
        }
        .video-container {
            width: 90%;
            max-width: 800px;
            background: #000;
            border: 2px solid #444;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        video {
            width: 100%;
            height: 100%;
            display: block;
        }
        .controls {
            margin-top: 20px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #007bff;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #0056b3; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <h2>📡 MonitorApp Viewer</h2>
    <div id="status">Connecting to Server...</div>

    <div class="video-container">
        <video id="remoteVideo" autoplay playsinline controls muted></video>
    </div>

    <div class="controls">
        <button onclick="switchCamera()">🔄 Switch Camera</button>
    </div>

    <script>
        const signalingServerUrl = "wss://app-z7ir.onrender.com";
        const roomId = "default-room"; // App wali same room id
        
        let ws;
        let peerConnection;
        const videoElement = document.getElementById('remoteVideo');
        const statusText = document.getElementById('status');

        const rtcConfig = {
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
        };

        function startViewer() {
            ws = new WebSocket(signalingServerUrl);

            ws.onopen = () => {
                statusText.innerText = "🟢 Server Connected! Waiting for Monitor App...";
                statusText.style.color = "#00ffcc";
                
                // Hum viewer (browser) ke roop me join kar rahe hain
                ws.send(JSON.stringify({
                    type: "join",
                    room: roomId,
                    role: "viewer"
                }));
            };

            ws.onmessage = async (event) => {
                const data = JSON.parse(event.data);

                if (data.type === 'offer') {
                    statusText.innerText = "🟡 Received Stream Offer, Connecting...";
                    await createPeerConnection();
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
                    
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    
                    ws.send(JSON.stringify({
                        type: "answer",
                        room: roomId,
                        sdp: peerConnection.localDescription.sdp
                    }));
                } 
                else if (data.type === 'candidate') {
                    if (peerConnection) {
                        try {
                            await peerConnection.addIceCandidate(new RTCIceCandidate({
                                sdpMid: data.sdpMid,
                                sdpMLineIndex: data.sdpMLineIndex,
                                candidate: data.candidate
                            }));
                        } catch (e) {
                            console.error("Error adding candidate", e);
                        }
                    }
                } 
                else if (data.type === 'monitor_disconnected') {
                    statusText.innerText = "🔴 Monitor App Disconnected!";
                    statusText.style.color = "#ff4444";
                    if (videoElement.srcObject) {
                        videoElement.srcObject.getTracks().forEach(track => track.stop());
                        videoElement.srcObject = null;
                    }
                    if (peerConnection) peerConnection.close();
                }
            };

            ws.onclose = () => {
                statusText.innerText = "🔴 Server Disconnected. Retrying...";
                statusText.style.color = "#ff4444";
                setTimeout(startViewer, 3000); // 3 sec baad auto reconnect
            };
        }

        async function createPeerConnection() {
            if (peerConnection) peerConnection.close();
            peerConnection = new RTCPeerConnection(rtcConfig);

            // Send ICE candidates to the monitor app
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    ws.send(JSON.stringify({
                        type: "candidate",
                        room: roomId,
                        candidate: event.candidate.candidate,
                        sdpMid: event.candidate.sdpMid,
                        sdpMLineIndex: event.candidate.sdpMLineIndex
                    }));
                }
            };

            // Jab video stream receive ho
            peerConnection.ontrack = (event) => {
                statusText.innerText = "🟢 Stream Live!";
                statusText.style.color = "#00ffcc";
                if (videoElement.srcObject !== event.streams[0]) {
                    videoElement.srcObject = event.streams[0];
                }
            };

            peerConnection.oniceconnectionstatechange = () => {
                if (peerConnection.iceConnectionState === 'disconnected' || peerConnection.iceConnectionState === 'failed') {
                    statusText.innerText = "🔴 Stream Lost! Check phone connection.";
                    statusText.style.color = "#ff4444";
                }
            };
        }

        // Camera Switch Button Function
        function switchCamera() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    command: "switch_camera",
                    room: roomId
                }));
                statusText.innerText = "🔄 Switching Camera...";
            } else {
                alert("Not connected to server!");
            }
        }

        // Script start
        startViewer();
    </script>
</body>
</html>
